include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # 03-RULES.md: no print() in committed code, no dangling futures.
    avoid_print: error
    unawaited_futures: error
    always_declare_return_types: warning
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"

linter:
  rules:
    - avoid_print
    - unawaited_futures
    - prefer_const_constructors
    - prefer_final_locals
    - always_use_package_imports
    - avoid_dynamic_calls
